name: Build Windows EXE

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:   # Cho phép bấm build thủ công

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      # Tạo file ZIP để dễ tải về
      - name: Zip Release Folder
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath originaltaste-windows.zip

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: originaltaste-windows
          path: |
            originaltaste-windows.zip
            build/windows/x64/runner/Release/
          retention-days: 30